<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEBI Check - Capture QR Code</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.css">
    <style>
        :root {
            --primary-color: #08317c;
            --white: #ffffff;
            --light-blue: #e6eeff;
            --hover-blue: #0a3d94;
            --text-secondary: #555;
            --danger-color: #dc3545;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--light-blue);
            color: var(--primary-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--primary-color);
            color: var(--white);
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: flex-end;
            align-items: center;
            position: relative; /* Add this */
        }
        
        header h1 { /* Style specifically for header H1 */
            margin: 0;
            font-size: 2rem;
        }
        .back-button {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--white);
            cursor: pointer;
            font-size: 1.5rem;
            padding: 0.5rem;
            z-index: 1;
        }
        main {
            flex: 1;
            padding: 2rem;
            max-width: 800px;
            margin: 1rem auto 2rem auto; /* Adjusted margin */
            width: 100%;
            box-sizing: border-box;
        }

        .main-logo {
            max-width: 150px;
            width: 100%;
            height: auto;
            display: block;
            margin: 0 auto 1rem auto;
        }

        .content {
            background-color: var(--white);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        }

        .capture-container {
            text-align: center;
            margin-bottom: 2rem;
        }

        #videoElement {
            width: 100%;
            max-width: 640px;
            margin: 0 auto;
            display: none;
        }

        #imagePreview {
            max-width: 100%;
            display: none;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 1rem 0;
        }

        .action-button {
            background-color: var(--primary-color);
            color: var(--white);
            border: none;
            border-radius: 4px;
            padding: 0.8rem 1.5rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .action-button:hover {
            background-color: var(--hover-blue);
        }

        #result {
            margin-top: 2rem;
            padding: 1rem;
            border-radius: 4px;
            text-align: center;
        }

        .valid-upi {
            color: var(--primary-color);
            font-weight: bold;
        }

        .invalid-upi {
            color: var(--danger-color);
            font-weight: bold;
        }

        .copy-button {
            background-color: var(--primary-color);
            color: var(--white);
            border: none;
            border-radius: 4px;
            padding: 0.5rem 1rem;
            cursor: pointer;
            margin-top: 1rem;
        }

        #fileInput {
            display: none;
        }

        .language-display {
            font-size: 0.9rem;
            background-color: var(--white);
            color: var(--primary-color);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .language-display:hover {
            background-color: var(--light-blue);
        }
        @media (max-width: 600px) {
            header {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
                justify-content: center; /* Center alignment for mobile */
            }
            header h1 {
                font-size: 1.5rem;
            }
            main {
                padding: 1rem;
                margin: 1rem auto;
            }
             main h1 { /* Adjust main title on mobile */
                 font-size: 1.5rem;
            }
             .main-logo {
                 max-width: 120px; /* Slightly smaller logo on mobile */
            }
            .content {
                padding: 1.5rem;
            }
             .section-title {
                 font-size: 1.1em;
             }
            .option-button {
                padding: 1.2rem 0.8rem;
                gap: 0.8rem;
            }
            .option-button i {
                font-size: 2.8em; /* Slightly smaller icon on mobile */
            }
            .option-button span {
                font-size: 1em; /* Slightly smaller text on mobile */
            }
        }

    </style>
</head>
<body>
    <header>
        <div id="language-display" class="language-display" onclick="changeLanguage()">
            Language: <span id="current-language">Loading...</span>
        </div>
        <button class="back-button" onclick="window.location.href='index.html'">
            <i class="fas fa-arrow-left"></i>
        </button>
    </header>

    <main>
        <img src="https://dur682txgv28e.cloudfront.net/assets/images/sebi-logo-crop.png" alt="SEBI Logo" class="main-logo">
        <h1 align="center">CHECK</h1>
        
        <div class="content">
            <div class="capture-container">
                <video id="videoElement" autoplay playsinline></video>
                <img id="imagePreview" alt="Preview">
                
                <div class="button-group">
                    <button class="action-button" id="startCamera">
                        <i class="fas fa-camera"></i> Start Camera
                    </button>
                    <button class="action-button" id="captureImage" style="display: none;">
                        <i class="fas fa-camera"></i> Capture
                    </button>
                    <label class="action-button" for="fileInput">
                        <i class="fas fa-upload"></i> Upload Image
                    </label>
                    <input type="file" id="fileInput" accept="image/*">
                </div>
            </div>

            <div id="result"></div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script>
        let stream = null;
        let cropper = null;
        const video = document.getElementById('videoElement');
        const imagePreview = document.getElementById('imagePreview');
        const startButton = document.getElementById('startCamera');
        const captureButton = document.getElementById('captureImage');
        const fileInput = document.getElementById('fileInput');
        const resultDiv = document.getElementById('result');

        startButton.addEventListener('click', startCamera);
        captureButton.addEventListener('click', captureImage);
        fileInput.addEventListener('change', handleFileUpload);

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
                video.style.display = 'block';
                imagePreview.style.display = 'none';
                startButton.style.display = 'none';
                captureButton.style.display = 'inline-block';
            } catch (err) {
                console.error('Error accessing camera:', err);
                alert('Could not access camera. Please ensure camera permissions are granted.');
            }
        }

        function captureImage() {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            processImage(canvas.toDataURL('image/jpeg'));
            
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            video.style.display = 'none';
            captureButton.style.display = 'none';
            startButton.style.display = 'inline-block';
        }

        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    processImage(event.target.result);
                };
                reader.readAsDataURL(file);
            }
        }

        function processImage(imageData) {
            imagePreview.src = imageData;
            imagePreview.style.display = 'block';
            
            if (cropper) {
                cropper.destroy();
            }
            
            cropper = new Cropper(imagePreview, {
                aspectRatio: 1,
                viewMode: 1,
                crop: function(event) {
                    const canvas = cropper.getCroppedCanvas();
                    if (canvas) {
                        detectQRCode(canvas);
                    }
                }
            });
        }

        async function detectQRCode(canvas) {
            const imageData = canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height);
            
            if (code) {
                const upiId = extractUPIFromURL(code.data);
                if (upiId) {
                    verifyUPIWithDatabase(upiId);
                }
            }
        }

        function extractUPIFromURL(url) {
            try {
                const urlObj = new URL(url);
                const pa = urlObj.searchParams.get('pa');
                return pa ? pa.split('@')[0] : null;
            } catch (e) {
                return null;
            }
        }

        async function verifyUPIWithDatabase(upiId) {
            try {
                const response = await fetch('account_db.xml');
                const xmlText = await response.text();
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, 'text/xml');
                
                const entities = xmlDoc.getElementsByTagName('Entity');
                let found = false;
                
                for (let entity of entities) {
                    const dbUpiId = entity.getElementsByTagName('upi_id')[0].textContent;
                    if (dbUpiId === upiId) {
                        const entityName = entity.getElementsByTagName('entity_name')[0].textContent;
                        showResult(true, upiId, entityName);
                        found = true;
                        break;
                    }
                }
                
                if (!found) {
                    showResult(false, upiId);
                }
            } catch (error) {
                console.error('Error verifying UPI:', error);
                resultDiv.innerHTML = 'Error verifying UPI ID. Please try again.';
            }
        }

        function showResult(isValid, upiId, entityName = '') {
            if (isValid) {
                resultDiv.innerHTML = `
                    <div class="valid-upi">
                        <p>Verified UPI ID</p>
                        <p>${entityName}</p>
                        <p>${upiId}</p>
                        <button class="copy-button" onclick="copyUPIId('${upiId}')">
                            <i class="fas fa-copy"></i> Copy UPI ID
                        </button>
                    </div>
                `;
            } else {
                resultDiv.innerHTML = `
                    <div class="invalid-upi">
                        <p>Not a valid verified UPI ID</p>
                    </div>
                `;
            }
        }

        function copyUPIId(upiId) {
            navigator.clipboard.writeText(upiId)
                .then(() => alert('UPI ID copied to clipboard!'))
                .catch(err => console.error('Error copying text:', err));
        }
    </script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        updateLanguageDisplay();
    });

    function updateLanguageDisplay() {
        const preferredLanguage = localStorage.getItem('preferredLanguage');

        fetch('check_list.xml') // Ensure this file exists and is accessible
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.text();
             })
            .then(data => {
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(data, "text/xml");
                 const parserError = xmlDoc.querySelector("parsererror");
                 if (parserError) {
                     console.error('Error parsing XML:', parserError);
                     throw new Error('Failed to parse language XML.');
                 }

                const languages = xmlDoc.getElementsByTagName("language");
                let found = false;
                for (let i = 0; i < languages.length; i++) {
                    const langId = languages[i].getAttribute('id');
                    if (langId === preferredLanguage) {
                        document.getElementById('current-language').textContent = languages[i].textContent;
                        found = true;
                        break;
                    }
                }
                if (!found) {
                     const defaultLangElement = xmlDoc.querySelector("language[id='en']") || languages[0];
                     document.getElementById('current-language').textContent = defaultLangElement ? defaultLangElement.textContent : 'English';
                }

            })
            .catch(error => {
                console.error('Error loading or parsing language list:', error);
                document.getElementById('current-language').textContent = preferredLanguage ? getLangNameFromCode(preferredLanguage) : 'English'; // Use a helper if needed
            });
    }

    // Optional helper function
    function getLangNameFromCode(langCode) {
        const names = { 'en': 'English', 'hi': 'हिन्दी' }; // Add more known languages
        return names[langCode] || langCode || 'English'; // Fallback logic
    }


    function changeLanguage() {
        // Redirect to language selection page
        window.location.href = 'lang_select.html'; // Ensure this page exists
    }
</script>
</body>
</html>
