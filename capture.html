<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEBI Check - Image Capture</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <select id="languageSelect" class="language-dropdown"></select>
        </div>
        <div class="camera-container">
            <video id="camera" autoplay playsinline></video>
            <canvas id="canvas" style="display: none;"></canvas>
            <button id="capture-btn" class="main-btn">Capture Image</button>
        </div>
        <div id="results" class="results-container">
            <h2>Detected UPI IDs:</h2>
            <div id="upi-list"></div>
        </div>
    </div>
    <script src="qr-scanner.min.js"></script>
    <script src="scripts.js"></script>
</body>
</html>
