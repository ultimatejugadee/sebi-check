<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Language Selection</title>
    <style>
        :root {
            --primary-color: #08317c;
            --white: #ffffff;
            --light-blue: #e6eeff;
            --hover-blue: #0a3d94;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--light-blue);
            color: var(--primary-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        header {
            background-color: var(--primary-color);
            color: var(--white);
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        
        main {
            flex: 1;
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }
        
        h1 {
            margin: 0;
            font-size: 2rem;
        }
        
        h2 {
            color: var(--primary-color);
            margin-bottom: 1.5rem;
            text-align: center;
        }
        
        .language-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 2rem;
        }
        
        .language-btn {
            background-color: var(--white);
            color: var(--primary-color);
            border: none; /* Remove all borders */
            border-left: 5px solid var(--primary-color); /* Add left border */
            border-radius: 8px;
            padding: 1rem;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        
        .language-btn:hover {
            background-color: var(--primary-color);
            color: var(--white);
            transform: translateY(-3px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        
        .loading {
            text-align: center;
            margin: 2rem 0;
            color: var(--primary-color);
        }
        
        footer {
            background-color: var(--primary-color);
            color: var(--white);
            text-align: center;
            padding: 1rem;
            margin-top: auto;
        }
        
        @media (max-width: 600px) {
            .language-container {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            h2 {
                font-size: 1.2rem;
            }
        }
    </style>
    <script src="scripts/redirection.js" defer></script>
</head>
<body>
    <header>
        <h1>Welcome</h1>
    </header>
    
    <main>
        <h2>Please Select Your Preferred Language</h2>
        <div id="loading" class="loading">Loading languages...</div>
        <div id="language-container" class="language-container"></div>
    </main>
    
    <footer>
        <p>&copy; 2023 Language Selection System</p>
    </footer>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Fetch the XML file
            fetch('lang_list.xml')
                .then(response => response.text())
                .then(data => {
                    const parser = new DOMParser();
                    const xmlDoc = parser.parseFromString(data, "text/xml");
                    const languages = xmlDoc.getElementsByTagName("language");
                    const container = document.getElementById('language-container');
                    const loading = document.getElementById('loading');
                    
                    // Hide loading message
                    loading.style.display = 'none';
                    
                    // Create buttons for each language
                    for (let i = 0; i < languages.length; i++) {
                        const langId = languages[i].getAttribute('id');
                        const langName = languages[i].textContent;
                        
                        const button = document.createElement('button');
                        button.className = 'language-btn';
                        button.textContent = langName;
                        button.setAttribute('data-lang-id', langId);
                        
                        button.addEventListener('click', function() {
                            // Set the preferred language in localStorage
                            localStorage.setItem('preferredLanguage', langId);
                            // Redirect to sebi_check.html
                            window.location.href = 'sebi_check.html';
                        });
                        
                        container.appendChild(button);
                    }
                })
                .catch(error => {
                    console.error('Error loading language list:', error);
                    document.getElementById('loading').textContent = 'Error loading languages. Please try again later.';
                });
        });
    </script>
</body>
</html>
